<svg width="480" height="393" viewBox="0 0 480 393"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     role="img" aria-label="GitHub Stats for AirbusA321NX">

  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
    <clipPath id="clip-card">
      <rect width="480" height="393" rx="14"/>
    </clipPath>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#010409" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Card background -->
  <g clip-path="url(#clip-card)" filter="url(#shadow)">
    <rect width="480" height="393" fill="url(#grad)"/>

    <!-- Accent stripe top -->
    <rect width="480" height="3" fill="url(#accent)"/>

    <!-- ── LEFT PANEL: Stats ─────────────────────────────────────── -->
    <g transform="translate(20, 20)">

