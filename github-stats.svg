        <rect x="0.0" y="0" width="138.6" height="10" fill="#DA5B0B"/>
        <rect x="138.6" y="0" width="6.3" height="10" fill="#3572A5"/>
        <rect x="144.9" y="0" width="6.1" height="10" fill="#e34c26"/>
        <rect x="151.0" y="0" width="2.1" height="10" fill="#f1e05a"/>
        <rect x="153.1" y="0" width="1.5" height="10" fill="#4F5D95"/>
        <rect x="154.6" y="0" width="1.5" height="10" fill="#663399"/>
