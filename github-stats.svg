        <text x="155" y="151" font-size="10.5" fill="#8b949e" text-anchor="end">0.5%</text>
        <rect x="0" y="156" width="155" height="5" rx="2.5" fill="#21262d"/>
        <rect x="0" y="156" width="2.0" height="5" rx="2.5" fill="#663399" opacity="0.85"/>
