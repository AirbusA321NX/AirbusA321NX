<svg width="340" height="328" viewBox="0 0 340 328"
     xmlns="http://www.w3.org/2000/svg"
     role="img" aria-label="Top Languages for AirbusA321NX">

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
    <clipPath id="card-clip">
      <rect width="340" height="328" rx="12"/>
    </clipPath>
  </defs>

  <g clip-path="url(#card-clip)">
    <!-- Background -->
    <rect width="340" height="328" fill="url(#bg)"/>

    <!-- Top accent stripe -->
    <rect width="340" height="3" fill="url(#accent)"/>

    <g transform="translate(28, 18)">

      <!-- Title -->
      <text x="0" y="16" font-size="14" font-weight="700" fill="#e6edf3"
            font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">Most Used Languages</text>
      <text x="284" y="16" font-size="10" fill="#8b949e" text-anchor="end"
            font-family="'Segoe UI',sans-serif">@AirbusA321NX</text>

      <!-- Stacked bar -->
      <g transform="translate(0, 24)">
        <rect width="284" height="12" rx="6" fill="#21262d"/>
        <clipPath id="bar-clip"><rect width="284" height="12" rx="6"/></clipPath>
        <g clip-path="url(#bar-clip)">
          <rect x="0.0" y="0" width="253.6" height="12" fill="#DA5B0B"/><rect x="253.6" y="0" width="11.8" height="12" fill="#3572A5"/><rect x="265.4" y="0" width="11.2" height="12" fill="#e34c26"/><rect x="276.6" y="0" width="3.9" height="12" fill="#f1e05a"/><rect x="280.5" y="0" width="2.0" height="12" fill="#4F5D95"/><rect x="282.5" y="0" width="2.0" height="12" fill="#663399"/>
        </g>
      </g>

      <!-- Language rows -->
      <g transform="translate(0, 48)">
        
        <!-- Jupyter Notebook -->
        <circle cx="6" cy="7" r="5" fill="#DA5B0B"/>
        <text x="18" y="12" font-size="12" fill="#c9d1d9"
              font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">Jupyter Notebook</text>
        <text x="284" y="12" font-size="11" fill="#8b949e"
              text-anchor="end" font-family="'Segoe UI',sans-serif">89.3%</text>
        <rect x="0" y="18" width="284" height="6" rx="3" fill="#21262d"/>
        <rect x="0" y="18" width="253.6" height="6" rx="3" fill="#DA5B0B" opacity="0.9"/>
        <!-- Python -->
        <circle cx="6" cy="45" r="5" fill="#3572A5"/>
        <text x="18" y="50" font-size="12" fill="#c9d1d9"
              font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">Python</text>
        <text x="284" y="50" font-size="11" fill="#8b949e"
              text-anchor="end" font-family="'Segoe UI',sans-serif">4.2%</text>
        <rect x="0" y="56" width="284" height="6" rx="3" fill="#21262d"/>
        <rect x="0" y="56" width="11.8" height="6" rx="3" fill="#3572A5" opacity="0.9"/>
        <!-- HTML -->
        <circle cx="6" cy="83" r="5" fill="#e34c26"/>
        <text x="18" y="88" font-size="12" fill="#c9d1d9"
              font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">HTML</text>
        <text x="284" y="88" font-size="11" fill="#8b949e"
              text-anchor="end" font-family="'Segoe UI',sans-serif">3.9%</text>
        <rect x="0" y="94" width="284" height="6" rx="3" fill="#21262d"/>
        <rect x="0" y="94" width="11.2" height="6" rx="3" fill="#e34c26" opacity="0.9"/>
        <!-- JavaScript -->
        <circle cx="6" cy="121" r="5" fill="#f1e05a"/>
        <text x="18" y="126" font-size="12" fill="#c9d1d9"
              font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">JavaScript</text>
        <text x="284" y="126" font-size="11" fill="#8b949e"
              text-anchor="end" font-family="'Segoe UI',sans-serif">1.4%</text>
        <rect x="0" y="132" width="284" height="6" rx="3" fill="#21262d"/>
        <rect x="0" y="132" width="3.9" height="6" rx="3" fill="#f1e05a" opacity="0.9"/>
        <!-- PHP -->
        <circle cx="6" cy="159" r="5" fill="#4F5D95"/>
        <text x="18" y="164" font-size="12" fill="#c9d1d9"
              font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">PHP</text>
        <text x="284" y="164" font-size="11" fill="#8b949e"
              text-anchor="end" font-family="'Segoe UI',sans-serif">0.5%</text>
        <rect x="0" y="170" width="284" height="6" rx="3" fill="#21262d"/>
        <rect x="0" y="170" width="3.0" height="6" rx="3" fill="#4F5D95" opacity="0.9"/>
        <!-- CSS -->
        <circle cx="6" cy="197" r="5" fill="#663399"/>
        <text x="18" y="202" font-size="12" fill="#c9d1d9"
              font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">CSS</text>
        <text x="284" y="202" font-size="11" fill="#8b949e"
              text-anchor="end" font-family="'Segoe UI',sans-serif">0.5%</text>
        <rect x="0" y="208" width="284" height="6" rx="3" fill="#21262d"/>
        <rect x="0" y="208" width="3.0" height="6" rx="3" fill="#663399" opacity="0.9"/>
      </g>

    </g>

    <!-- Footer -->
    <text x="170" y="321" font-size="8.5" fill="#30363d"
          text-anchor="middle" font-family="'Segoe UI',sans-serif">
      Auto-updated via GitHub Actions
    </text>
  </g>
</svg>