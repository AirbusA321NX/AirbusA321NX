        <text x="155" y="123" font-size="10.5" fill="#8b949e" text-anchor="end">0.5%</text>
        <rect x="0" y="128" width="155" height="5" rx="2.5" fill="#21262d"/>
        <rect x="0" y="128" width="2.0" height="5" rx="2.5" fill="#4F5D95" opacity="0.85"/>
        <circle cx="6" cy="146" r="5" fill="#663399"/>
        <text x="16" y="151" font-size="11" fill="#c9d1d9"
