        <text x="155" y="95" font-size="10.5" fill="#8b949e" text-anchor="end">1.4%</text>
        <rect x="0" y="100" width="155" height="5" rx="2.5" fill="#21262d"/>
        <rect x="0" y="100" width="2.1" height="5" rx="2.5" fill="#f1e05a" opacity="0.85"/>
        <circle cx="6" cy="118" r="5" fill="#4F5D95"/>
        <text x="16" y="123" font-size="11" fill="#c9d1d9"
