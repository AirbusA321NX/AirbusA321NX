      <text x="0" y="40" font-size="11" fill="#8b949e"
            font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">Shivam Jindal · 2026 Contributions: 102</text>

      <!-- Divider -->
      <rect x="0" y="50" width="240" height="1" fill="#21262d"/>

      <!-- Stats grid -->
      <text x="40" y="70" font-size="18" text-anchor="middle">⭐</text><text x="40" y="88" font-size="13" font-weight="bold" fill="#e6edf3" text-anchor="middle">79</text><text x="40" y="102" font-size="10" fill="#8b949e" text-anchor="middle">Stars</text><text x="120" y="70" font-size="18" text-anchor="middle">🍴</text><text x="120" y="88" font-size="13" font-weight="bold" fill="#e6edf3" text-anchor="middle">0</text><text x="120" y="102" font-size="10" fill="#8b949e" text-anchor="middle">Forks</text><text x="200" y="70" font-size="18" text-anchor="middle">📦</text><text x="200" y="88" font-size="13" font-weight="bold" fill="#e6edf3" text-anchor="middle">23</text><text x="200" y="102" font-size="10" fill="#8b949e" text-anchor="middle">Repos</text><text x="40" y="122" font-size="18" text-anchor="middle">👥</text><text x="40" y="140" font-size="13" font-weight="bold" fill="#e6edf3" text-anchor="middle">4</text><text x="40" y="154" font-size="10" fill="#8b949e" text-anchor="middle">Followers</text><text x="120" y="122" font-size="18" text-anchor="middle">💻</text><text x="120" y="140" font-size="13" font-weight="bold" fill="#e6edf3" text-anchor="middle">97</text><text x="120" y="154" font-size="10" fill="#8b949e" text-anchor="middle">Commits</text><text x="200" y="122" font-size="18" text-anchor="middle">🔀</text><text x="200" y="140" font-size="13" font-weight="bold" fill="#e6edf3" text-anchor="middle">1</text><text x="200" y="154" font-size="10" fill="#8b949e" text-anchor="middle">PRs</text>

      <!-- Divider 2 -->
      <rect x="0" y="175" width="240" height="1" fill="#21262d"/>

      <!-- Issues & Reviews -->
      <text x="0"   y="192" font-size="11" fill="#8b949e">Issues opened</text>
      <text x="240" y="192" font-size="11" fill="#c9d1d9" text-anchor="end" font-weight="600">0</text>
      <text x="0"   y="208" font-size="11" fill="#8b949e">PR Reviews</text>
      <text x="240" y="208" font-size="11" fill="#c9d1d9" text-anchor="end" font-weight="600">0</text>

