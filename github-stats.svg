        <text x="155" y="11" font-size="10.5" fill="#8b949e" text-anchor="end">89.4%</text>
        <rect x="0" y="16" width="155" height="5" rx="2.5" fill="#21262d"/>
        <rect x="0" y="16" width="138.6" height="5" rx="2.5" fill="#DA5B0B" opacity="0.85"/>
        <circle cx="6" cy="34" r="5" fill="#3572A5"/>
        <text x="16" y="39" font-size="11" fill="#c9d1d9"
              font-family="'Segoe UI', sans-serif">Python</text>
        <text x="155" y="39" font-size="10.5" fill="#8b949e" text-anchor="end">4.0%</text>
        <rect x="0" y="44" width="155" height="5" rx="2.5" fill="#21262d"/>
        <rect x="0" y="44" width="6.3" height="5" rx="2.5" fill="#3572A5" opacity="0.85"/>
        <circle cx="6" cy="62" r="5" fill="#e34c26"/>
        <text x="16" y="67" font-size="11" fill="#c9d1d9"
              font-family="'Segoe UI', sans-serif">HTML</text>
        <text x="155" y="67" font-size="10.5" fill="#8b949e" text-anchor="end">3.9%</text>
        <rect x="0" y="72" width="155" height="5" rx="2.5" fill="#21262d"/>
        <rect x="0" y="72" width="6.1" height="5" rx="2.5" fill="#e34c26" opacity="0.85"/>
        <circle cx="6" cy="90" r="5" fill="#f1e05a"/>
        <text x="16" y="95" font-size="11" fill="#c9d1d9"
