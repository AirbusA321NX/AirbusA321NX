name: Update GitHub Stats

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (public, no token)
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Debug secret existence
        run: |
          if [ -n "${{ secrets.README_STATS }}" ]; then
            echo "✅ Secret README_STATS is set."
          else
            echo "❌ Secret README_STATS is NOT set. Please add it."
            exit 1
          fi

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=radical
          path: profile/stats.svg
          token: ${{ secrets.README_STATS }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=radical&langs_count=8
          path: profile/top-langs.svg
          token: ${{ secrets.README_STATS }}

      - name: Debug generated files
        run: |
          echo "Files in profile/ directory:"
          ls -la profile/ || echo "profile/ directory not found"
          if [ -f profile/stats.svg ]; then
            echo "✅ stats.svg exists"
          else
            echo "❌ stats.svg missing"
          fi
          if [ -f profile/top-langs.svg ]; then
            echo "✅ top-langs.svg exists"
          else
            echo "❌ top-langs.svg missing"
          fi

      - name: Commit and push changes
        uses: EndBug/add-and-commit@v9
        with:
          author_name: github-actions[bot]
          author_email: github-actions[bot]@users.noreply.github.com
          message: 'Update GitHub stats cards'
          add: 'profile/*.svg'
          push: true
          token: ${{ secrets.README_STATS }}
